{% extends 'base.html' %} 

{% block content %}
<h2>Delete Skills</h2>

<form method="POST">
  {% csrf_token %}
  <p>Are you sure that you want to delete the post "{{skills.experience}}"?</p>
  <div>
    <button type="submit">Yes, Delete</button>
    <a href="{% url 'skills-view' %}">Cancel</a>
  </div>
</form>

{% endblock content %}
